name: Generate Wallpaper

on:
  schedule:
    - cron: "30 18 * * *"  # 00:00 IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate wallpaper
        run: node generate.js

      - name: Deploy to gh-pages branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Fetch and switch to gh-pages
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages

          # Remove everything in gh-pages
          git rm -rf . || true

          # Copy generated image from main workspace
          cp output/wallpaper3.png .

          # Add and commit
          git add wallpaper3.png
          git commit -m "Update wallpaper" || echo "No changes to commit"

          git push origin gh-pages
