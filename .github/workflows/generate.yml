name: Generate Wallpaper

on:
  schedule:
    - cron: "30 18 * * *"  # 00:00 IST (UTC is 5:30 behind IST)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate wallpaper
        run: node generate.js

      - name: Commit and push generated image
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/wallpaper3.png
          git commit -m "Update wallpaper"
          git push
